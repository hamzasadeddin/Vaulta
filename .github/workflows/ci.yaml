name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: analyze • test • coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Test
        run: flutter test --coverage --reporter expanded

      - name: Coverage gate
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 80
          # very_good_coverage splits `exclude` on spaces, not newlines, so
          # these must stay on one line. Generated code and app entrypoints
          # carry no meaningful unit tests and shouldn't count toward the
          # threshold.
          exclude: "lib/main_*.dart lib/bootstrap.dart lib/widgetbook/** **/*.g.dart **/*.freezed.dart"
